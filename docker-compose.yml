services:
  postgres:
    image: postgres:16-alpine
    container_name: sceneradar-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sceneradar}
      POSTGRES_USER: ${POSTGRES_USER:-sceneradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sceneradar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sceneradar} -d ${POSTGRES_DB:-sceneradar}"]
      interval: 5s
      timeout: 5s
      retries: 20

  city-service:
    build:
      context: .
      dockerfile: services/city_service/Dockerfile
    container_name: sceneradar-city-service
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  events-service:
    build:
      context: .
      dockerfile: services/events_service/Dockerfile
    container_name: sceneradar-events-service
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  artist-service:
    build:
      context: .
      dockerfile: services/artist_service/Dockerfile
    container_name: sceneradar-artist-service
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  genre-service:
    build:
      context: .
      dockerfile: services/genre_service/Dockerfile
    container_name: sceneradar-genre-service
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  venue-service:
    build:
      context: .
      dockerfile: services/venue_service/Dockerfile
    container_name: sceneradar-venue-service
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  scoring-service:
    build:
      context: .
      dockerfile: services/scoring_service/Dockerfile
    container_name: sceneradar-scoring-service
    env_file: .env
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: sceneradar-api-gateway
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - city-service
      - events-service
      - artist-service
      - genre-service
      - venue-service
      - scoring-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sceneradar-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
